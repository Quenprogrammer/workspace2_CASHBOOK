
  <div class="card h-100">
    <div class="card-body card-body-height">
      <h4 class="card-header-title mb-3" >Latest transactions</h4>


      <div class=" grid-page">
        <div class="row">
          @for(item of MENU_ITEMS; track item.name){
          <div class="col-4 col-lg-2 custom-hover">
            <a [routerLink]="item.link" class="card-link custom-hover">
              <img [src]="item.icon" alt="{{ item.name }}" class="card-icon"/>
              <app-text [text]="item.name"></app-text>
               </a>
          </div>
          }
        </div>
      </div>


      <div class=" grid-page">
        <div class="row">

            <div class="col-4 col-lg-2 custom-hover">
              <a (click)="isModal1Open = true" class="card-link custom-hover">
                <img src="icons/statis.svg" alt=" item.name " class="card-icon"/>
                <app-text [text]="'Statistics'"></app-text>
              </a>
            </div>
            <div class="col-4 col-lg-2 custom-hover">
              <a (click)="isModal2Open = true" class="card-link custom-hover">
                <img src="item.icon" alt=" item.name " class="card-icon"/>
                <app-text [text]="'Payment'"></app-text>
              </a>
            </div>

        </div>
      </div>



      <div *ngIf="isModal1Open" class="modal-overlay">
        <div class="modal-content">

          <!-- Review Section -->
          <div id="reviewSection" class=" ">

            <div class="row">
              <div class="col-md-12 mb-7 mb-md-0">
                <div class="border-bottom pb-4 mb-4">
                  <!-- Card -->
                  <div class="card bg-primary mb-3">
                    <span class="close" (click)="isModal1Open = false">&times;</span>

                    <div class="card-body">
                      <!-- Media -->
                      <div class="d-flex justify-content-center">
                        <div class="d-flex align-items-center">
                          <div class="flex-shrink-0">
                            <span class="display-4 text-white">4.7</span>
                          </div>

                          <div class="flex-grow-1 ms-3">
                            <!-- Rating -->

                            <span class="text-white">287 reviews</span>
                          </div>
                        </div>
                      </div>
                      <!-- End Media -->
                    </div>
                  </div>
                  <!-- End Card -->

                  <h3>Rating breakdown</h3>

                  <!-- Ratings -->
                  <div class="d-grid gap-1">
                    <a class="row align-items-center" href="#" style="">
                      <div class="col-md-3 text-start">
                        <h4 class="text-dark">Expense-to-Income Ratio</h4>
                        <app-text [text]="'Expense-to-Income Ratio'"></app-text>
                      </div>
                      <!-- End Col -->

                      <div class="col-md-8">
                        <div class="progress" style="height: 15px;">
                          <div class="progress-bar bg-dark" role="progressbar" style="width: 43%" aria-valuenow="43"
                               aria-valuemin="0" aria-valuemax="100"></div>

                        </div>
                      </div>
                      <!-- End Col -->

                      <div class="col-md-1 text-end">
                        <h3>205</h3>
                      </div>
                      <!-- End Col -->
                    </a>
                    <a class="row align-items-center" href="#" style="">
                      <div class="col-3 text-start">
                        <h4 class="text-dark">Savings (Surplus/Deficit)</h4>
                        <app-text [text]="'Savings (Surplus/Deficit)'"></app-text>

                      </div>
                      <!-- End Col -->

                      <div class="col-8">

                        <div class="progress" style="height: 20px;">
                          <div class="progress-bar" role="progressbar" style="width: 75%;" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">25%</div>
                        </div>
                        <div class="progress" style="height: 15px;">
                          <div class="progress-bar " role="progressbar" style="width: 43%" aria-valuenow="43"
                               aria-valuemin="0" aria-valuemax="100"></div>

                        </div>
                      </div>
                      <!-- End Col -->

                      <div class="col-1 text-end">
                        <h3>205</h3>
                      </div>
                      <!-- End Col -->
                    </a>
                    <a class="row align-items-center" href="#" style="">
                      <div class="col-3 text-start">
                        <app-text [text]="'Monthly Average Income'"></app-text>

                      </div>
                      <!-- End Col -->

                      <div class="col-8">
                        <div class="progress" style="height: 15px;">
                          <div class="progress-bar bg-dark" role="progressbar" style="width: 43%" aria-valuenow="43"
                               aria-valuemin="0" aria-valuemax="100"></div>

                        </div>
                      </div>
                      <!-- End Col -->

                      <div class="col-1 text-end">
                        <h3>205</h3>
                      </div>
                      <!-- End Col -->
                    </a>
                    <a class="row align-items-center" href="#" style="">
                      <div class="col-3 text-start">
                        <app-text [text]="'Monthly Average Expenses'"></app-text>
                      </div>
                      <!-- End Col -->

                      <div class="col-8">
                        <div class="progress">
                          <div class="progress-bar" role="progressbar" style="width: 100%;  height:100px;" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                      </div>
                      <!-- End Col -->

                      <div class="col-1 text-end">
                        <h3>205</h3>
                      </div>
                      <!-- End Col -->
                    </a>
                    <a class="row align-items-center" href="#" style="">
                      <div class="col-3 text-start">
                        <app-text [text]="'Debt vs Total Income'"></app-text>
                      </div>
                      <!-- End Col -->

                      <div class="col-8">
                        <div class="progress" style="height: 15px;">
                          <div class="progress-bar bg-dark" role="progressbar" style="width: 43%" aria-valuenow="43"
                               aria-valuemin="0" aria-valuemax="100"></div>

                        </div>
                      </div>
                      <!-- End Col -->

                      <div class="col-1 text-end">
                        <h3>205</h3>
                      </div>
                      <!-- End Col -->
                    </a>
                    <a class="row align-items-center" href="#" style="">
                      <div class="col-3 text-start">
                        <h4 class="text-dark">Profit Margin</h4>
                        <app-text [text]="'Profit Margin'"></app-text>
                      </div>
                      <!-- End Col -->

                      <div class="col-8">
                        <div class="progress" style="height: 15px;">
                          <div class="progress-bar bg-dark" role="progressbar" style="width: 43%" aria-valuenow="43"
                               aria-valuemin="0" aria-valuemax="100"></div>

                        </div>
                      </div>
                      <!-- End Col -->

                      <div class="col-1 text-end">
                        <h3>205</h3>
                      </div>
                      <!-- End Col -->
                    </a>
                  </div>
                  <!-- End Ratings -->
                </div>


              </div>
              <!-- End Col -->


              <!-- End Col -->
            </div>
            <!-- End Row -->
          </div>
          <!-- End Review Section -->
        </div>
      </div>

       <div *ngIf="isModal2Open" class="modal-overlay">
        <div class="modal-content">
          <span class="close" (click)="isModal2Open = false">&times;</span>
          <h2>Modal 2</h2>

        </div>
      </div>


    </div>
    <!-- End Body -->
  </div>
  <!-- End Card -->
